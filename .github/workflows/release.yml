name: Release

on:
  push:
    branches: [main, dev]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # ── stable release (main) ──────────────────────────────────────────────
      - name: Create release PR or publish (stable)
        if: github.ref == 'refs/heads/main'
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── pre-release (dev → @next) ──────────────────────────────────────────
      - name: Publish pre-release to npm (@next)
        if: github.ref == 'refs/heads/dev'
        id: prerelease
        run: |
          # Enter pre-release mode if not already; bump snapshot version; publish @next
          pnpm changeset pre enter next 2>/dev/null || true
          pnpm changeset version
          VERSION=$(node -p "require('./package.json').version")
          echo "Publishing $VERSION as @next"
          pnpm changeset publish --tag next
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── MCP Registry (both branches, non-blocking) ─────────────────────────
      - name: Publish to the MCP Registry
        if: |
          (github.ref == 'refs/heads/main' && steps.changesets.outputs.published == 'true') ||
          (github.ref == 'refs/heads/dev' && steps.prerelease.outputs.published == 'true')
        continue-on-error: true
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('server.json', 'utf8'));
            manifest.version = '$VERSION';
            manifest.packages[0].version = '$VERSION';
            fs.writeFileSync('server.json', JSON.stringify(manifest, null, 2));
          "
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz" -o publisher.tar.gz
          tar xzf publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
