name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm OIDC trusted publishing + MCP Registry auth — no token secrets

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to the MCP Registry
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('server.json', 'utf8'));
            manifest.version = '$VERSION';
            manifest.packages[0].version = '$VERSION';
            fs.writeFileSync('server.json', JSON.stringify(manifest, null, 2));
          "
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          TARBALL="mcp-publisher_${OS}_${ARCH}.tar.gz"
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/${TARBALL}" -o publisher.tar.gz
          tar xzf publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
