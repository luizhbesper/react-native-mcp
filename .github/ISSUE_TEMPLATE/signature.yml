name: Build error signature
description: Contribute a known native build failure to the signature database (no code required)
labels: [signature-db]
body:
  - type: markdown
    attributes:
      value: |
        Signatures turn raw build logs into actionable diagnostics. To contribute one we need
        the exact error text and what fixed it. Prefer opening a PR (see CONTRIBUTING.md —
        it is just YAML + a log snippet), but this issue works too.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [ios, android, cocoapods, metro]
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: The failing log excerpt
      description: Paste ~10-30 lines around the error, redacting private paths if needed.
      render: text
    validations:
      required: true
  - type: textarea
    id: cause
    attributes:
      label: Probable cause
      description: Why does this happen?
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: The fix that worked
    validations:
      required: true
  - type: input
    id: rn-version
    attributes:
      label: React Native version(s) affected
      placeholder: '0.84+'
