name: Bug report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: doctor output
      description: Run the `doctor` tool (or `node scripts/mcp-call.mjs doctor` from a checkout) and paste the text output.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: react-native-dev-mcp version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: Claude Code 2.x / Codex CLI / Cursor
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run the server with --verbose and paste relevant stderr lines.
      render: text
